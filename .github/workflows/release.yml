name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm install
      - run: npm run build

      - name: Publish acum-client to npm
        run: npm publish --workspace=packages/acum-client --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mcp to npm
        run: npm publish --workspace=packages/mcp --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Compute npm tarball SHA256
        id: sha
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://registry.npmjs.org/@acum-api/mcp/-/mcp-${VERSION}.tgz"
          # Give the registry a moment to make the tarball available
          sleep 10
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TARBALL_URL: ${{ steps.sha.outputs.url }}
          TARBALL_SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          sed -i "s|url \".*registry.npmjs.org.*\"|url \"${TARBALL_URL}\"|" homebrew/Formula/acum-mcp.rb
          sed -i "s|sha256 \".*\"|sha256 \"${TARBALL_SHA256}\"|" homebrew/Formula/acum-mcp.rb

      - name: Commit updated formula
        env:
          RELEASE_VERSION: ${{ steps.sha.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/Formula/acum-mcp.rb
          git commit -m "chore: update Homebrew formula for v${RELEASE_VERSION}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Install via Homebrew

            ```bash
            brew tap yanirclsr/tap
            brew install acum-mcp
            ```

            ## Install via npm

            ```bash
            npm install -g @acum-api/mcp
            ```

            ## Use in Claude Desktop

            Add to `claude_desktop_config.json`:
            ```json
            {
              "mcpServers": {
                "acum": {
                  "command": "acum-mcp"
                }
              }
            }
            ```
